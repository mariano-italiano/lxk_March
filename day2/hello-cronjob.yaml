apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cronjob
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello-container
            image: busybox:1.28
            command: ["sh", "-c", "date; for i in 1 2 3 ; do echo Hello from the Kubernetes cluster po raz $i; done"]
          restartPolicy: OnFailure
