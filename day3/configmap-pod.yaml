apiVersion: v1
kind: Pod
metadata:
  name: configmap-pod
spec:
  containers:
    - name: busy
      image: busybox
      command: [ "/bin/sh", "-c", "env; while true; do sleep 3600; done"]
      env:
        - name: APP_CONFIG
          valueFrom:
            configMapKeyRef:
              name: my-configmap
              key: config.json 
      envFrom:
        - configMapRef:
            name: env-cm
  restartPolicy: Never
